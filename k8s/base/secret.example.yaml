# Example only — DO NOT commit real credentials. Create the real Secret out-of-band,
# e.g. with `kubectl create secret generic mongodb-credentials --from-literal=uri=...`,
# or manage it through a sealed-secret / external-secret operator.
#
# For the distributed lock to coordinate ALL four data centers, every data center must
# point at the SAME logical MongoDB deployment (a global replica set or sharded cluster
# reachable from each DC). If each DC used its own isolated MongoDB, locks would only be
# mutually exclusive within a data center, not across them.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  labels:
    app.kubernetes.io/name: distributed-semaphore
type: Opaque
stringData:
  uri: "mongodb://app_user:CHANGE_ME@mongo-0.global,mongo-1.global,mongo-2.global/distributed_locks?replicaSet=rs0&authSource=admin&w=majority"
